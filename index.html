<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ufriend AI Admin</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f6fb;
}

.header {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.logo {
  font-weight: bold;
  color: #4f46e5;
}

.container {
  max-width: 900px;
  margin: 20px auto;
  padding: 10px;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
  border: 1px solid #eee;
}

textarea, input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  padding: 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.btn {
  width: 100%;
  background: #4f46e5;
  color: white;
  font-weight: bold;
}

.row {
  display: flex;
  gap: 10px;
}

.copy {
  background: #10b981;
  color: white;
  flex: 1;
}

.clear {
  background: #ef4444;
  color: white;
  flex: 1;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">🚀 Ufriend AI</div>

  <div>
    <div id="userName">Loading...</div>
    <div id="userRole"></div>
  </div>
</div>

<div class="container">

  <div class="card">
    <h3>โพสต์</h3>
    <textarea id="post"></textarea>

    <h3>ลิงก์วิดีโอ</h3>
    <input id="videoUrl">
  </div>

  <div class="card">
    <h3>คอมเมนต์ลูกค้า</h3>
    <textarea id="comment"></textarea>
  </div>

  <div class="card">
    <button class="btn" onclick="generate()">
      ⚡ Generate AI Reply
    </button>
  </div>

  <div class="card">
    <h3>ผลลัพธ์</h3>
    <textarea id="result" readonly></textarea>
  </div>

  <div class="card row">
    <button class="copy" onclick="copyText()">📋 Copy</button>
    <button class="clear" onclick="clearAll()">🗑️ Clear</button>
  </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxCyH9CEl1GCs-AFM-848t8w9E7GtwzhmpOyTYduZQ6m7YKYcB9VbXrahQp7mFWmOyY/exec";

/* โหลด user */
if (typeof google !== "undefined") {
  google.script.run.withSuccessHandler(res => {
    if (!res.success) return;
    document.getElementById("userName").innerText = res.name;
    document.getElementById("userRole").innerText = res.role;
  }).getCurrentUser();
}

/* Generate */
async function generate() {

  const res = await fetch(API_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      post: document.getElementById("post").value,
      comment: document.getElementById("comment").value,
      videoUrl: document.getElementById("videoUrl").value
    })
  });

  const data = await res.json();
  document.getElementById("result").value = data.reply;
}

/* Copy */
function copyText() {
  navigator.clipboard.writeText(
    document.getElementById("result").value
  );
}

/* Clear */
function clearAll() {
  document.getElementById("post").value = "";
  document.getElementById("comment").value = "";
  document.getElementById("videoUrl").value = "";
  document.getElementById("result").value = "";
}

</script>

</body>
</html>
