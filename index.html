  </div>

<!-- SECTION POST -->

<div class="container">

<div class="card">

<h3>📝 ชื่อโพส</h3>

<textarea
  id="post"
  placeholder="วางข้อความโพส Facebook หรือ TikTok..."
></textarea>

<br><br>

<label><b>🎥 ลิงก์วิดีโอ</b></label>

<input
id="videoUrl"
placeholder="https://..."

>

<div class="status">
  🖼️ รองรับ Ctrl + V เพื่อวางรูปภาพ
</div>

<div id="imagePreview" class="preview"></div>

</div>

<!-- SECTION COMMENT -->

<div class="card">

<h3>💬 คอมเมนต์ลูกค้า</h3>

<textarea
  id="comment"
  placeholder="คอมเมนต์ลูกค้า..."
></textarea>

<div
  id="commentCount"
  class="status">
  0 ตัวอักษร
</div>

</div>

<!-- SECTION GENERATE -->

<div class="card">

<button
id="generateBtn"
class="btn generate"
onclick="generateReply()">

⚡ Generate AI Reply

</button>

</div>

<!-- SECTION RESULT -->

<div class="card">

<h3>🤖 คำตอบ AI</h3>

<textarea
  id="result"
  readonly
  placeholder="ผลลัพธ์จาก AI..."
></textarea>

</div>

<!-- SECTION BUTTON -->

<div class="card">

<div class="button-row">

<button
id="copyBtn"
class="btn copy"
onclick="copyReply()">

📋 คัดลอกคำตอบ

</button>

<button
class="btn clear"
onclick="clearForm()">

🗑️ ล้างข้อมูล

</button>

</div>

</div>

</div>

<div class="footer">
  Ufriend AI Admin System
</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxTegsKPmGfArxByfsvseaVfg3c0Gh8vF4BDepIfKJZwKgd6FQjxzVPsX0QMOzg9ADlqg/exec";

let pastedImage = null;

/* โหลดข้อมูลผู้ใช้ */

if(typeof google !== "undefined"){

google.script.run
.withSuccessHandler(function(user){

  if(!user.success) return;

  document.getElementById("userName").innerHTML =
    "👤 " + user.name;

  document.getElementById("userRole").innerHTML =
    user.role;

})
.getCurrentUser();

}

/* Auto Dark Mode */

if(
window.matchMedia &&
window.matchMedia("(prefers-color-scheme: dark)").matches
){
document.documentElement.setAttribute(
  "data-theme",
  "dark"
);
}

/* Toggle Theme */

function toggleTheme(){

const html =
document.documentElement;

const btn =
document.querySelector(".theme-btn");

if(
html.getAttribute("data-theme")
==="dark"
){

html.removeAttribute("data-theme");

btn.innerHTML =
"🌙 Theme";

}else{

html.setAttribute(
  "data-theme",
  "dark"
);

btn.innerHTML =
"☀️ Theme";

}

}

/* Character Counter */

document
.getElementById("comment")
.addEventListener(
"input",
function(){

document.getElementById(
"commentCount"
).innerHTML =
this.value.length +
" ตัวอักษร";

});

/* Paste Image */

document.addEventListener(
"paste",
(e)=>{

const items =
e.clipboardData.items;

for(const item of items){

if(
item.type.indexOf("image")
!== -1
){

const file =
item.getAsFile();

pastedImage = file;

const reader =
new FileReader();

reader.onload =
function(event){

document.getElementById(
"imagePreview"
).innerHTML =
`<img src="${event.target.result}">`;

};

reader.readAsDataURL(file);

}

}

});

/* Generate AI */

async function generateReply(){

const result =
document.getElementById(
"result"
);

const btn =
document.getElementById(
"generateBtn"
);

btn.disabled = true;

result.value =
"🤖 AI กำลังคิด...";

try{

const response =
await fetch(
API_URL,
{
method:"POST",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({

post:
document.getElementById(
"post"
).value,

comment:
document.getElementById(
"comment"
).value,

videoUrl:
document.getElementById(
"videoUrl"
).value

})
}
);

const data =
await response.json();

result.value =
data.reply ||
"ไม่พบคำตอบ";

}catch(error){

result.value =
"เกิดข้อผิดพลาด : "
+ error.message;

}

btn.disabled = false;

}

/* Copy */

function copyReply(){

const text =
document.getElementById(
"result"
).value;

if(!text) return;

navigator.clipboard.writeText(
text
);

const btn =
document.getElementById(
"copyBtn"
);

btn.innerHTML =
"✅ คัดลอกแล้ว";

setTimeout(()=>{

btn.innerHTML =
"📋 คัดลอกคำตอบ";

},1500);

}

/* Clear */

function clearForm(){

if(
!confirm(
"ต้องการล้างข้อมูลทั้งหมดใช่หรือไม่?"
)
){
return;
}

document.getElementById(
"post"
).value = "";

document.getElementById(
"comment"
).value = "";

document.getElementById(
"videoUrl"
).value = "";

document.getElementById(
"result"
).value = "";

document.getElementById(
"imagePreview"
).innerHTML = "";

document.getElementById(
"commentCount"
).innerHTML =
"0 ตัวอักษร";

pastedImage = null;

}

</script>
