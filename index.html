<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ufriend AI System</title>
</head>
<body>

<h2>💬 Ufriend AI Comment System</h2>

<input id="post" placeholder="ชื่อโพส">

<br><br>

<select id="channel">
  <option value="facebook">Facebook</option>
  <option value="tiktok">TikTok</option>
</select>

<br><br>

<textarea id="comment" placeholder="คอมเมนต์ลูกค้า"></textarea>

<br><br>

<input id="admin" placeholder="ชื่อแอดมิน">

<br><br>

<button onclick="send()">Generate AI Comment</button>

<pre id="result"></pre>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwh5GMdMUddPWuW28cnmvII3U5XNlPYbINtE7Fi2gIWzWxxbjuMzOd6aOa2cvEo_hqPTg/exec";

async function send() {
  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      post: document.getElementById("post").value,
      channel: document.getElementById("channel").value,
      comment: document.getElementById("comment").value,
      admin: document.getElementById("admin").value
    })
  });

  const data = await res.json();

  document.getElementById("result").innerText =
    "โทน: " + data.tone + "\n\n" + data.reply;
}

</script>

</body>
</html>
