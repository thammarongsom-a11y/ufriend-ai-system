<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ufriend AI SaaS</title>

<style>
body{font-family:sans-serif;background:#f3f4f6}
#wrap{max-width:800px;margin:auto}
#chat{height:320px;overflow:auto;background:#fff;padding:10px}
.msg{margin:5px 0}
.user{color:blue}
.ai{color:green}
#dash{margin-top:10px;background:#fff;padding:10px}
</style>
</head>

<body>

<div id="wrap">

<h2>💬 Chat AI</h2>

<div id="chat"></div>

<input id="msg" style="width:80%">
<button onclick="send()">Send</button>

<h2>📊 Dashboard</h2>
<div id="dash">Loading...</div>

</div>

<script>

const API = "YOUR_WEB_APP_URL";

async function send(){

  const msg = document.getElementById("msg").value;

  add("You: " + msg, "user");

  const res = await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ message: msg })
  });

  const data = await res.json();

  add("AI: " + data.reply, "ai");

  loadDash();
}

function add(text, cls){
  const d = document.createElement("div");
  d.className = cls;
  d.innerText = text;
  document.getElementById("chat").appendChild(d);
}

async function loadDash(){

  const res = await fetch(API + "?action=dashboard");
  const data = await res.json();

  let html = "";
  for (const k in data){
    html += `<div>👤 ${k} : ${data[k]} msgs</div>`;
  }

  document.getElementById("dash").innerHTML = html;
}

loadDash();

</script>

</body>
</html>
