<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ufriend AI Admin</title>

<style>

:root{
 --bg:#f5f7fb;
 --card:#ffffff;
 --text:#111827;
 --border:#e5e7eb;
 --primary:#2563eb;
 --primary-hover:#1d4ed8;
 --shadow:0 4px 16px rgba(0,0,0,.08);
}

[data-theme="dark"]{
 --bg:#0f172a;
 --card:#1e293b;
 --text:#f8fafc;
 --border:#334155;
 --primary:#3b82f6;
 --primary-hover:#60a5fa;
 --shadow:none;
}

*{
 box-sizing:border-box;
}

body{
 margin:0;
 font-family:Segoe UI,Tahoma,sans-serif;
 background:var(--bg);
 color:var(--text);
 transition:.3s;
}

.header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:16px 24px;
 background:var(--card);
 border-bottom:1px solid var(--border);
 position:sticky;
 top:0;
 z-index:999;
}

.logo{
 font-size:20px;
 font-weight:700;
}

.theme-btn{
 border:none;
 padding:10px 14px;
 border-radius:10px;
 cursor:pointer;
 background:var(--primary);
 color:#fff;
}

.container{
 max-width:1000px;
 margin:auto;
 padding:20px;
}

.card{
 background:var(--card);
 border:1px solid var(--border);
 border-radius:16px;
 padding:20px;
 margin-bottom:20px;
 box-shadow:var(--shadow);
}

h3{
 margin-top:0;
}

textarea,
input{
 width:100%;
 padding:12px;
 border-radius:12px;
 border:1px solid var(--border);
 background:transparent;
 color:var(--text);
 font-size:14px;
}

#post{
 min-height:220px;
 resize:vertical;
}

#comment{
 min-height:120px;
 resize:vertical;
}

#result{
 min-height:180px;
 resize:vertical;
}

.preview{
 margin-top:15px;
 text-align:center;
}

.preview img{
 max-width:100%;
 border-radius:12px;
}

.action-btn{
 width:100%;
 border:none;
 padding:14px;
 border-radius:12px;
 cursor:pointer;
 font-size:15px;
 font-weight:600;
}

.generate-btn{
 background:var(--primary);
 color:white;
}

.generate-btn:hover{
 background:var(--primary-hover);
}

.copy-btn{
 background:#22c55e;
 color:white;
}

.copy-btn:hover{
 opacity:.9;
}

.status{
 margin-top:10px;
 font-size:13px;
 opacity:.7;
}

</style>

</head>

<body>

<div class="header">
 <div class="logo">🚀 Ufriend AI Admin</div>

 <button class="theme-btn" onclick="toggleTheme()">
  🌙 Theme
 </button>
</div>

<div class="container">

 <div class="card">
  <h3>📝 ชื่อโพส</h3>

  <textarea
   id="post"
   placeholder="วางข้อความโพส Facebook / TikTok ที่นี่..."
  ></textarea>

  <div style="margin-top:15px">
   <label><b>🎥 ลิงก์วิดีโอ</b></label>

<input
id="videoUrl"
placeholder="https://vt.tiktok.com/... หรือ Reel URL"

>

  </div>

  <div class="status">
   รองรับวางรูปภาพด้วย Ctrl + V
  </div>

  <div class="preview" id="imagePreview"></div>

 </div>

 <div class="card">
  <h3>💬 คอมเมนต์ลูกค้า</h3>

  <textarea
   id="comment"
   placeholder="คอมเมนต์ลูกค้า..."
  ></textarea>

 </div>

 <div class="card">
  <button
   class="action-btn generate-btn"
   onclick="generateReply()">
   ⚡ Generate AI Reply
  </button>
 </div>

 <div class="card">
  <h3>🤖 คำตอบ AI</h3>

  <textarea
   id="result"
   readonly
   placeholder="ผลลัพธ์จาก AI..."
  ></textarea>

 </div>

 <div class="card">
  <button
   id="copyBtn"
   class="action-btn copy-btn"
   onclick="copyReply()">
   📋 คัดลอกคำตอบ
  </button>
 </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzbFSaNUoDCPTkzvjN38Q2CXklFDB34SXYE4b1VwwRGf3Juf5u2IaGGd3j73fsqxhKRDQ/exec";

let pastedImage = null;

if(
 window.matchMedia &&
 window.matchMedia('(prefers-color-scheme: dark)').matches
){
 document.documentElement.setAttribute('data-theme','dark');
}

function toggleTheme(){

 const current =
 document.documentElement.getAttribute('data-theme');

 if(current === 'dark'){
   document.documentElement.removeAttribute('data-theme');
 }else{
   document.documentElement.setAttribute('data-theme','dark');
 }
}

document.addEventListener("paste",(e)=>{

 const items = e.clipboardData.items;

 for(const item of items){

  if(item.type.indexOf("image") !== -1){

   const file = item.getAsFile();

   pastedImage = file;

   const reader = new FileReader();

   reader.onload = function(event){

    document.getElementById("imagePreview").innerHTML =
    `<img src="${event.target.result}">`;

   }

   reader.readAsDataURL(file);

  }

 }

});

async function generateReply(){

 const result = document.getElementById("result");

 result.value = "AI กำลังคิด...";

 try{

  const res = await fetch(API_URL,{
   method:"POST",
   body:JSON.stringify({
     post:document.getElementById("post").value,
     videoUrl:document.getElementById("videoUrl").value,
     comment:document.getElementById("comment").value,
     channel:"system"
   })
  });

  const data = await res.json();

  result.value = data.reply || "";

 }catch(error){

  result.value =
  "เกิดข้อผิดพลาด: " + error.message;

 }

}

function copyReply(){

 const text =
 document.getElementById("result").value;

 if(!text) return;

 navigator.clipboard.writeText(text);

 const btn =
 document.getElementById("copyBtn");

 btn.innerHTML = "✅ คัดลอกแล้ว";

 setTimeout(()=>{
   btn.innerHTML = "📋 คัดลอกคำตอบ";
 },1500);

}

</script>

</body>
</html>
