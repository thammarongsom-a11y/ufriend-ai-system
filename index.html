<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ufriend AI Admin v2</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a1c33;
  color: white;
}

/* TOP BAR */
.topbar {
  background: #0f2f5f;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.brand {
  color: #ffd84d;
  font-weight: bold;
}

/* MAIN */
.container {
  display: flex;
  gap: 20px;
  padding: 20px;
}

/* CARD */
.card {
  flex: 1;
  background: #102a4d;
  padding: 20px;
  border-radius: 12px;
}

/* INPUT */
input, textarea {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
}

textarea {
  height: 120px;
}

/* BUTTON */
button {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  background: #ffd84d;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #ffcc00;
}

/* RESULT */
.result {
  background: #0f2f5f;
  padding: 15px;
  border-radius: 10px;
  min-height: 200px;
  border-left: 5px solid #ffd84d;
}

/* COPY BUTTON */
.copy {
  background: white;
  color: #0a1c33;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">🚀 Ufriend AI Admin v2</div>
  <div id="user">Guest</div>
</div>

<!-- MAIN -->
<div class="container">

  <!-- LEFT -->
  <div class="card">

    <h3>📝 Input</h3>

    <input id="post" placeholder="ชื่อโพส">
    <textarea id="comment" placeholder="คอมเมนต์ลูกค้า"></textarea>

    <button onclick="generate()">⚡ Generate AI Reply</button>

  </div>

  <!-- RIGHT -->
  <div class="card">

    <h3>🤖 AI Result</h3>

    <div class="result" id="result">
      ผลลัพธ์จะแสดงที่นี่
    </div>

    <button class="copy" onclick="copyText()">📋 Copy Text</button>

  </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzbFSaNUoDCPTkzvjN38Q2CXklFDB34SXYE4b1VwwRGf3Juf5u2IaGGd3j73fsqxhKRDQ/exec";

let lastReply = "";

// 👤 จำ user จาก login (ถ้ามีระบบในอนาคต)
let user = localStorage.getItem("user") || "Admin";
document.getElementById("user").innerText = user;

// 🤖 generate AI
async function generate() {

  document.getElementById("result").innerHTML = "⏳ AI กำลังคิด...";

  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      post: document.getElementById("post").value,
      comment: document.getElementById("comment").value,
      channel: "system",
      admin: user
    })
  });

  const data = await res.json();

  lastReply = data.reply;

  document.getElementById("result").innerHTML =
    "<b>โทน:</b> " + data.tone + "<br><br>" +
    "<b>คำตอบ:</b><br>" + data.reply;
}

// 📋 copy
function copyText() {
  if (!lastReply) return alert("ยังไม่มีข้อความ");

  navigator.clipboard.writeText(lastReply);
  alert("คัดลอกแล้ว ✅");
}

</script>

</body>
</html>
